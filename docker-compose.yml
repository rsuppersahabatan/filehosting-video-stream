version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: laravel
        uid: 1000
    image: filevideo-app
    container_name: filevideo-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - filevideo

  nginx:
    image: nginx:1.25-alpine
    container_name: filevideo-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - filevideo

  mysql:
    image: mysql:8.0
    container_name: filevideo-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - filevideo

  redis:
    image: redis:7-alpine
    container_name: filevideo-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - filevideo

  node:
    image: node:14-alpine
    container_name: filevideo-node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - filevideo
    tty: true
    command: sh -c "npm install && npm run dev"

networks:
  filevideo:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
